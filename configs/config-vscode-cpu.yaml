prePuller:
  hook:
    enabled: false
  continuous:
    enabled: false

singleuser:
  image:
    name: docker.io/library/pytorch-codeserver
    tag: latest
    pullPolicy: IfNotPresent
  storage:
    homeMountPath: "/home/jovyan"
    capacity: 20Gi
  lifecycleHooks:
    postStart:
      exec:
        command:
          - /bin/bash
          - -c
          - '[ -d "/home/jovyan/$GIT_REPO" ] || git clone "https://github.com/$GIT_ORG/$GIT_REPO" "/home/jovyan/$GIT_REPO"'

  cpu:
    limit: 4
    guarantee: 1
  memory:
    limit: 16G
    guarantee: 8G

proxy:
  service:
    type: NodePort
    nodePorts:
      http: 30080
  chp:
    extraCommandLineFlags:
      - "--no-include-prefix"

hub:
  config:
    JupyterHub:
      admin_access: true
    Authenticator:
      admin_users:
        - admin
  extraEnv:
    JHUB_USER_PASSWORD:
      valueFrom:
        secretKeyRef:
          name: jhub-passwords
          key: user-password
    JHUB_ADMIN_PASSWORD:
      valueFrom:
        secretKeyRef:
          name: jhub-passwords
          key: admin-password

cull:
  enabled: true
  timeout: 7200
  every: 600
