prePuller:
  hook:
    enabled: false
  continuous:
    enabled: false

singleuser:
  image:
    name: docker.io/library/pytorch-codeserver
    tag: latest
    pullPolicy: IfNotPresent
  extraEnv:
    NVIDIA_VISIBLE_DEVICES: "void"
    SPLINTER_API_KEY:
      valueFrom:
        secretKeyRef:
          name: jhub-passwords
          key: splinter-api-key
  storage:
    homeMountPath: "/home/jovyan"
    capacity: 20Gi
  lifecycleHooks:
    postStart:
      exec:
        command:
          - /bin/bash
          - -c
          - |
            set -e
            cd /home/jovyan
            [ -d "$GIT_REPO" ] || git clone "https://github.com/$GIT_ORG/$GIT_REPO" "$GIT_REPO"
            cd "$GIT_REPO"
            if [ -f pyproject.toml ]; then
              uv sync
            fi
            ACTIVATE="source /home/jovyan/$GIT_REPO/.venv/bin/activate"
            grep -qxF "$ACTIVATE" /home/jovyan/.bashrc 2>/dev/null || echo "$ACTIVATE" >> /home/jovyan/.bashrc

  cpu:
    limit: 4
    guarantee: 1
  memory:
    limit: 16G
    guarantee: 8G

proxy:
  service:
    type: NodePort
    nodePorts:
      http: 30080
  chp:
    extraCommandLineFlags:
      - "--no-include-prefix"

hub:
  config:
    JupyterHub:
      admin_access: true
      logo_file: /usr/local/share/jupyterhub/static/images/logo.png
      template_paths:
        - /usr/local/share/jupyterhub/templates-custom
    Authenticator:
      admin_users:
        - admin
  extraFiles:
    logo:
      mountPath: /usr/local/share/jupyterhub/static/images/logo.png
    login_template:
      mountPath: /usr/local/share/jupyterhub/templates-custom/login.html
      # stringData provided by deploy.sh via --set-file
  extraEnv:
    JHUB_USER_PASSWORD:
      valueFrom:
        secretKeyRef:
          name: jhub-passwords
          key: user-password
    JHUB_ADMIN_PASSWORD:
      valueFrom:
        secretKeyRef:
          name: jhub-passwords
          key: admin-password


cull:
  enabled: true
  timeout: 7200
  every: 600
