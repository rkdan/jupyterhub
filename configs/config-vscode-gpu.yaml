prePuller:
  hook:
    enabled: false
  continuous:
    enabled: false

singleuser:
  image:
    name: docker.io/library/pytorch-codeserver
    tag: latest
    pullPolicy: IfNotPresent
  storage:
    homeMountPath: "/home/jovyan"
    capacity: 20Gi
  lifecycleHooks:
    postStart:
      exec:
        command:
          - /bin/bash
          - -c
          - |
            set -e
            [ -d "/home/jovyan/$GIT_REPO" ] || git clone "https://github.com/$GIT_ORG/$GIT_REPO" "/home/jovyan/$GIT_REPO"
            EXT_DIR=/home/jovyan/.local/share/code-server/extensions
            mkdir -p "$EXT_DIR"
            if [ -d /opt/code-extensions ]; then
              cp -rn /opt/code-extensions/. "$EXT_DIR"/
            fi

  extraResource:
    limits:
      nvidia.com/mig-1g.12gb: 1
  cpu:
    limit: 4
    guarantee: 2
  memory:
    limit: 16G
    guarantee: 8G

proxy:
  service:
    type: NodePort
    nodePorts:
      http: 30080
  chp:
    extraCommandLineFlags:
      - "--no-include-prefix"

hub:
  config:
    JupyterHub:
      admin_access: true
      logo_file: /usr/local/share/jupyterhub/static/images/logo.png
      template_paths:
        - /usr/local/share/jupyterhub/templates-custom
    Authenticator:
      admin_users:
        - admin
  extraFiles:
    logo:
      mountPath: /usr/local/share/jupyterhub/static/images/logo.png
      # binaryData provided by deploy.sh via --set-file
    login_template:
      mountPath: /usr/local/share/jupyterhub/templates-custom/login.html
      # stringData provided by deploy.sh via --set-file
  extraEnv:
    JHUB_USER_PASSWORD:
      valueFrom:
        secretKeyRef:
          name: jhub-passwords
          key: user-password
    JHUB_ADMIN_PASSWORD:
      valueFrom:
        secretKeyRef:
          name: jhub-passwords
          key: admin-password

cull:
  enabled: true
  timeout: 7200
  every: 600